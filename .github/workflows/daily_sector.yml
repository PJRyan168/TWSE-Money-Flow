name: 台股盤後族群統計

on:
  schedule:
    # UTC 09:30 = 台北 17:30(收盤與三大法人資料公布後)
    - cron: "30 9 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "統計日期 YYYY-MM-DD(留空 = 今天)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install pandas requests

      - name: 執行統計腳本
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TZ: Asia/Taipei
          RUN_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$RUN_DATE" ]; then
            python sector_pipeline.py --date "$RUN_DATE"
          else
            python sector_pipeline.py
          fi

      - name: 提交結果回 repo
        run: |
          if [ -d output ]; then
            git config user.name "sector-bot"
            git config user.email "actions@github.com"
            git add output/
            git diff --cached --quiet || git commit -m "盤後統計 $(TZ=Asia/Taipei date +%F)"
            git pull --rebase
            git push
          else
            echo "本日無交易資料,略過提交。"
          fi

      - name: Telegram 收盤通知
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify_telegram.py
