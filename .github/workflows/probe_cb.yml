name: CB 端點探測(手動)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install requests

      - name: 執行 CB 端點探測
        run: python probe_cb.py
